<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Profile Avatar Upload</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 text-slate-900">

  <!-- Processing Overlay -->
  <div id="processingOverlay" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 flex-col text-white">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-white mb-4"></div>
    <p id="overlayText" class="text-lg font-semibold">Processing...</p>
  </div>

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-slate-900">Update Profile Picture</h1>
      <p id="status" class="text-sm text-slate-500 mt-1">Checking session...</p>
    </div>

    <!-- Raw Error Display -->
    <div id="errorBox" class="hidden bg-rose-100 text-rose-700 p-4 rounded-xl text-xs font-mono break-words whitespace-pre-wrap border border-rose-300"></div>

    <div id="upload-container" class="hidden space-y-6">
      
      <!-- File Input -->
      <div>
        <input 
          type="file" 
          id="avatar-input" 
          accept="image/png, image/jpeg, image/webp"
          class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer border border-slate-200 rounded-xl"
        >
      </div>

      <!-- Live Server Preview (Only shows AFTER successful upload) -->
      <div id="previewContainer" class="hidden flex justify-center bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl p-2">
        <img id="preview-img" class="w-full h-auto max-h-64 object-contain rounded-lg" alt="Server Upload Preview" />
      </div>
      
      <!-- Save Button -->
      <button 
        id="saveBtn" 
        class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition cursor-pointer hidden"
      >
        Save to Profile
      </button>

    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://vixrjkcyrlbwxgegihcm.supabase.co", 
      "sb_publishable_k4gygyuumSWF1k50bYxzlA_ns1iY3lQ"
    );

    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const uploadContainer = document.getElementById("upload-container");
    const fileInput = document.getElementById("avatar-input");
    const previewContainer = document.getElementById("previewContainer");
    const previewImg = document.getElementById("preview-img");
    const saveBtn = document.getElementById("saveBtn");
    const overlay = document.getElementById("processingOverlay");
    const overlayText = document.getElementById("overlayText");

    let currentUserId = null;
    let uploadedImageUrl = null;

    function toggleOverlay(show, text = "Processing...") {
      overlayText.innerText = text;
      overlay.classList.toggle("hidden", !show);
      overlay.classList.toggle("flex", show);
    }

    function displayError(err) {
      errorBox.classList.remove("hidden");
      // Output raw error details to the screen
      errorBox.innerText = `RAW ERROR DETAILS:\n\n${err.message || err}\n${err.stack || ''}`;
      console.error(err);
    }

    function clearError() {
      errorBox.classList.add("hidden");
      errorBox.innerText = "";
    }

    /* 1. AUTH CHECK */
    async function checkSession() {
      try {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (error) throw error;
        
        if (session?.user) {
          currentUserId = session.user.id;
          statusEl.innerText = "Select an image to upload.";
          statusEl.className = "text-sm text-emerald-600 mt-1";
          uploadContainer.classList.remove("hidden");
        } else {
          statusEl.innerText = "Error: Not logged in.";
          statusEl.className = "text-sm text-rose-500 mt-1";
        }
      } catch (err) {
        displayError(err);
      }
    }

    /* 2. AUTO-UPLOAD ON FILE SELECT */
    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      clearError();
      previewContainer.classList.add("hidden");
      saveBtn.classList.add("hidden");
      toggleOverlay(true, "Uploading direct to server...");

      try {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("userId", currentUserId);

        const res = await fetch("/api/upload-avatar", { 
          method: "POST", 
          body: formData 
        });
        
        if (!res.ok) {
          const rawErr = await res.text();
          throw new Error(`HTTP Status Code: ${res.status} ${res.statusText}\n\nServer Response:\n${rawErr}`);
        }
        
        const result = await res.json();
        
        // Use the URL directly from the server response
        uploadedImageUrl = result.url; 

        // Show preview only now that upload is confirmed
        previewImg.src = uploadedImageUrl;
        previewContainer.classList.remove("hidden");
        saveBtn.classList.remove("hidden");
        statusEl.innerText = "Upload successful! Ready to save.";

      } catch (err) {
        displayError(err);
      } finally {
        toggleOverlay(false);
      }
    });

    /* 3. SAVE URL TO DB */
    saveBtn.onclick = async () => {
      if (!uploadedImageUrl) return;
      
      clearError();
      toggleOverlay(true, "Saving to database...");
      
      try {
        const { error } = await supabase
          .from("profiles")
          .update({ avatar_url: uploadedImageUrl })
          .eq("id", currentUserId);

        if (error) throw error;
        
        statusEl.innerText = "Profile picture saved successfully!";
        saveBtn.classList.add("hidden");
        fileInput.value = ""; // Reset input
        
      } catch (err) {
        displayError(err);
      } finally {
        toggleOverlay(false);
      }
    };

    // Initialize Page
    checkSession();
  </script>
</body>
</html>
