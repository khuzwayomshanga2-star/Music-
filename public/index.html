<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 text-white">

  <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 w-full max-w-md shadow-2xl">
    <div class="text-center mb-6">
      <h1 class="text-xl font-bold">Google Auth</h1>
      <p id="status" class="text-xs text-slate-400 mt-2 bg-slate-950 p-2 rounded-sm font-mono break-all">
        Ready
      </p>
    </div>

    <button
      onclick="signInWithGoogle()"
      class="w-full flex items-center justify-center gap-3 bg-white text-slate-900 font-bold py-3 px-4 rounded-xl hover:bg-slate-100 transition cursor-pointer shadow-md"
    >
      Continue with Google
    </button>
  </div>

  <script>
    const SUPABASE_URL = "https://vixrjkcyrlbwxgegihcm.supabase.co";
    const SUPABASE_ANON_KEY = "Sb_publishable_k4gygyuumSWF1k50bYxzlA_ns1iY3lQ";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function signInWithGoogle() {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://me-khuzwayo.vercel.app/Thinking",
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if (error) {
        alert("OAuth error:\n" + JSON.stringify(error, null, 2));
        console.error(error);
      }
    }

    async function saveProfile(user) {
      if (!user) return;

      const fullName =
        user.user_metadata?.full_name ||
        user.user_metadata?.name ||
        user.user_metadata?.email ||
        null;

      const { error } = await supabaseClient
        .from("profiles")
        .upsert(
          {
            id: user.id,
            full_name: fullName,
            updated_at: new Date().toISOString()
          },
          { onConflict: "id" }
        );

      if (error) {
        console.error("Profile save error:", error);
        document.getElementById("status").innerText = "Profile save failed";
      } else {
        document.getElementById("status").innerText = "Profile saved";
      }
    }

    async function handleSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        document.getElementById("status").innerText = "Session error";
        console.error(error);
        return;
      }

      if (data.session?.user) {
        await saveProfile(data.session.user);
        document.getElementById("status").innerText =
          "Signed in as " + (data.session.user.email || "user");
      } else {
        document.getElementById("status").innerText = "Not signed in";
      }
    }

    handleSession();

    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (session?.user && (event === "SIGNED_IN" || event === "INITIAL_SESSION")) {
        await saveProfile(session.user);
        document.getElementById("status").innerText =
          "Signed in as " + (session.user.email || "user");
      }
    });
  </script>
</body>
</html>
