<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white p-8 rounded-2xl border border-slate-100 w-full max-w-md shadow-2xl space-y-6">
    <!-- Header -->
    <div class="text-center">
      <h1 class="text-2xl font-bold text-slate-900">Welcome Back</h1>
      <p id="status" class="text-sm text-slate-500 mt-1 font-mono">Ready to sign in</p>
    </div>

    <!-- Error Display (Hidden by default) -->
    <div id="error-box" class="hidden bg-rose-50 border border-rose-200 text-rose-700 text-sm p-4 rounded-xl">
      <strong class="block mb-1 font-semibold">Error Occurred</strong>
      <pre id="error-text" class="whitespace-pre-wrap break-all text-xs font-mono"></pre>
    </div>

    <!-- Authentication Area -->
    <div id="auth-container">
      <button
        id="googleBtn"
        class="w-full flex items-center justify-center gap-3 bg-slate-900 text-white font-bold py-3 px-4 rounded-xl hover:bg-slate-800 transition cursor-pointer shadow-md"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- Profile View (Hidden by default) -->
    <div id="user-box" class="hidden space-y-4">
      <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">User Data</h2>
        <pre id="user-json" class="text-[11px] font-mono text-slate-700 bg-white p-2 rounded border border-slate-200 overflow-x-auto"></pre>
      </div>

      <button
        onclick="signOut()"
        class="w-full bg-slate-100 text-slate-700 font-semibold py-3 px-4 rounded-xl hover:bg-slate-200 transition cursor-pointer"
      >
        Sign Out
      </button>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://vixrjkcyrlbwxgegihcm.supabase.co";
    const SUPABASE_ANON_KEY = "Sb_publishable_k4gygyuumSWF1k50bYxzlA_ns1iY3lQ";

    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("error-box");
    const errorText = document.getElementById("error-text");
    const userBox = document.getElementById("user-box");
    const userJson = document.getElementById("user-json");
    const googleBtn = document.getElementById("googleBtn");
    const authContainer = document.getElementById("auth-container");

    function showStatus(text) { statusEl.innerText = text; }
    
    function showError(err) {
      errorBox.classList.remove("hidden");
      errorText.innerText = typeof err === "string" ? err : JSON.stringify(err, null, 2);
    }

    function clearError() { errorBox.classList.add("hidden"); }

    async function signInWithGoogle() {
      clearError();
      showStatus("Redirecting to Google...");
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin,
          queryParams: { prompt: "select_account" }
        }
      });
      if (error) showError(error);
    }

    async function signOut() {
      await supabaseClient.auth.signOut();
      window.location.reload();
    }

    googleBtn.addEventListener("click", signInWithGoogle);

    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        authContainer.classList.add("hidden");
        userBox.classList.remove("hidden");
        userJson.innerText = JSON.stringify(session.user, null, 2);
        showStatus("Signed in as " + (session.user.email || "user"));
      } else {
        if (event === "INITIAL_SESSION") showStatus("Checking authentication...");
        else showStatus("Ready to sign in");
      }
    });
  </script>
</body>
</html>
