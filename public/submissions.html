<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Pending Music Submissions</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4">
  <div class="max-w-3xl mx-auto mt-10 bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
    <div class="flex items-start justify-between gap-4 mb-2">
      <div>
        <h1 class="text-2xl font-bold mb-2">My Pending Submissions</h1>
        <p class="text-slate-400 mb-6">These are your submissions where acceptance is false.</p>
      </div>  <button
    id="makeSubmissionTopBtn"
    class="hidden shrink-0 rounded-xl bg-blue-600 hover:bg-blue-700 transition px-4 py-3 font-bold"
  >
    Make Submission
  </button>
</div>

<div class="mb-4 p-4 rounded-xl bg-slate-800/60 border border-slate-700">
  <div class="text-sm text-slate-400">Session status</div>
  <div id="sessionStatus" class="font-semibold mt-1">Loading session...</div>
  <div id="userInfo" class="text-sm text-slate-300 mt-2"></div>
</div>

<div id="status" class="hidden mb-4 rounded-xl px-4 py-3 text-sm"></div>

<div id="emptyState" class="hidden min-h-[260px] flex items-center justify-center">
  <div class="text-center">
    <div class="text-lg font-semibold mb-2">You have no pending submissions.</div>
    <div class="text-slate-400 mb-6">Create a new one to start uploading your music.</div>
    <button
      id="makeSubmissionCenterBtn"
      class="rounded-xl bg-blue-600 hover:bg-blue-700 transition px-6 py-3 font-bold"
    >
      Make Submission
    </button>
  </div>
</div>

<div id="list" class="space-y-3"></div>

  </div>  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://vixrjkcyrlbwxgegihcm.supabase.co",
      "sb_publishable_k4gygyuumSWF1k50bYxzlA_ns1iY3lQ"
    );

    const sessionStatus = document.getElementById("sessionStatus");
    const userInfo = document.getElementById("userInfo");
    const statusBox = document.getElementById("status");
    const listBox = document.getElementById("list");
    const emptyState = document.getElementById("emptyState");
    const makeSubmissionTopBtn = document.getElementById("makeSubmissionTopBtn");
    const makeSubmissionCenterBtn = document.getElementById("makeSubmissionCenterBtn");

    function goToMakeSubmission() {
      window.location.href = "upload-music.html";
    }

    makeSubmissionTopBtn.addEventListener("click", goToMakeSubmission);
    makeSubmissionCenterBtn.addEventListener("click", goToMakeSubmission);

    function showStatus(message, type = "info") {
      statusBox.className =
        "mb-4 rounded-xl px-4 py-3 text-sm " +
        (type === "success"
          ? "bg-green-500/15 text-green-300 border border-green-700"
          : type === "error"
          ? "bg-red-500/15 text-red-300 border border-red-700"
          : "bg-blue-500/15 text-blue-300 border border-blue-700");
      statusBox.textContent = message;
      statusBox.classList.remove("hidden");
    }

    async function refreshSession() {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;

      const currentUser = data.session?.user || null;

      if (currentUser) {
        sessionStatus.textContent = "Logged in";
        userInfo.textContent = `User ID: ${currentUser.id} | Email: ${currentUser.email || "N/A"}`;
        return currentUser;
      } else {
        sessionStatus.textContent = "Not logged in";
        userInfo.textContent = "Please sign in first.";
        return null;
      }
    }

    function renderItem(item) {
      const card = document.createElement("button");
      card.type = "button";
      card.className =
        "w-full text-left p-4 rounded-xl border border-slate-700 bg-slate-800/70 hover:bg-slate-800 transition";

      card.innerHTML = `
        <div class="flex items-center justify-between gap-3">
          <div>
            <div class="font-semibold text-lg">${item.title || "Untitled"}</div>
            <div class="text-sm text-slate-400 break-all">ID: ${item.id}</div>
          </div>
          <div class="text-xs px-3 py-1 rounded-full bg-amber-500/15 text-amber-300 border border-amber-700">
            Pending
          </div>
        </div>
        <div class="mt-3 text-sm text-slate-300">
          Comment: ${item.comment ? item.comment : "No comment yet"}
        </div>
        <div class="mt-2 text-xs text-slate-500">
          Created: ${item.created_at ? new Date(item.created_at).toLocaleString() : "Unknown"}
        </div>
      `;

      card.addEventListener("click", () => {
        window.location.href = `upload-image.html?submissionId=${encodeURIComponent(item.id)}`;
      });

      return card;
    }

    async function loadPending() {
      listBox.innerHTML = "";
      emptyState.classList.add("hidden");
      makeSubmissionTopBtn.classList.add("hidden");
      showStatus("Loading submissions...", "info");

      const { data, error } = await supabase.rpc("list_my_pending_music_submissions");

      if (error) {
        console.error(error);
        showStatus(error.message || "Failed to load submissions", "error");
        return;
      }

      if (!data || data.length === 0) {
        statusBox.classList.add("hidden");
        emptyState.classList.remove("hidden");
        makeSubmissionTopBtn.classList.add("hidden");
        return;
      }

      statusBox.classList.add("hidden");
      emptyState.classList.add("hidden");
      makeSubmissionTopBtn.classList.remove("hidden");

      data.forEach((item) => {
        listBox.appendChild(renderItem(item));
      });
    }

    const user = await refreshSession();
    if (user) {
      await loadPending();
    }

    supabase.auth.onAuthStateChange(async () => {
      const u = await refreshSession();
      if (u) {
        await loadPending();
      } else {
        listBox.innerHTML = "";
        emptyState.classList.add("hidden");
        makeSubmissionTopBtn.classList.add("hidden");
      }
    });
  </script></body>
</html>
