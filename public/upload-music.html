<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Music</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 24px;
    }

    .card {
      max-width: 600px;
      margin: 0 auto;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 12px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #0b1220;
      color: #e2e8f0;
      font-size: 16px;
    }

    button {
      background: #2563eb;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 12px;
      min-height: 24px;
      white-space: pre-wrap;
    }

    .progress {
      width: 100%;
      height: 14px;
      background: #1f2937;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
      display: none;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #22c55e;
      transition: width 0.2s ease;
    }

    a {
      color: #93c5fd;
      word-break: break-all;
    }

    small {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Music</h1>
    <small>Choose an audio file like MP3, M4A, WAV, OGG, AAC, or even MP4.</small>

    <input id="fileInput" type="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.ogg,.flac,.mp4,video/mp4" />
    <button id="uploadBtn">Upload as Raw</button>

    <div class="progress" id="progressWrap">
      <div class="bar" id="progressBar"></div>
    </div>

    <div class="status" id="status">Waiting for file...</div>
    <div class="status" id="result" style="display:none;"></div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusBox = document.getElementById("status");
    const resultBox = document.getElementById("result");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function setProgress(percent) {
      progressWrap.style.display = "block";
      progressBar.style.width = `${percent}%`;
    }

    function resetProgress() {
      progressWrap.style.display = "none";
      progressBar.style.width = "0%";
    }

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        setStatus("Please choose a file first.");
        return;
      }

      uploadBtn.disabled = true;
      resultBox.style.display = "none";
      resetProgress();
      setStatus("Getting upload signature...");

      try {
        const sigRes = await fetch("/api/upload-music");
        const sigData = await sigRes.json();

        if (!sigRes.ok) {
          throw new Error(sigData.error || "Failed to get signature");
        }

        setStatus("Uploading file to Cloudinary...");

        const formData = new FormData();
        formData.append("file", file);
        formData.append("api_key", sigData.apiKey);
        formData.append("timestamp", sigData.timestamp);
        formData.append("signature", sigData.signature);
        formData.append("folder", sigData.folder);
        formData.append("resource_type", sigData.resourceType);

        const uploadUrl = `https://api.cloudinary.com/v1_1/${sigData.cloudName}/raw/upload`;

        const xhr = new XMLHttpRequest();
        xhr.open("POST", uploadUrl, true);

        xhr.upload.onprogress = (event) => {
          if (event.lengthComputable) {
            const percent = Math.round((event.loaded / event.total) * 100);
            setProgress(percent);
            setStatus(`Uploading... ${percent}%`);
          }
        };

        xhr.onload = () => {
          uploadBtn.disabled = false;

          try {
            const response = JSON.parse(xhr.responseText);

            if (xhr.status >= 200 && xhr.status < 300) {
              setStatus("Upload completed successfully.");
              resultBox.style.display = "block";
              resultBox.innerHTML = `
                <strong>Uploaded URL:</strong><br />
                <a href="${response.secure_url}" target="_blank">${response.secure_url}</a><br /><br />
                <strong>Public ID:</strong> ${response.public_id}<br />
                <strong>Format:</strong> ${response.format || "raw"}
              `;
              setProgress(100);
            } else {
              throw new Error(response.error?.message || "Upload failed");
            }
          } catch (err) {
            setStatus("Upload failed: " + err.message);
          }
        };

        xhr.onerror = () => {
          uploadBtn.disabled = false;
          setStatus("Network error during upload.");
        };

        xhr.send(formData);
      } catch (error) {
        uploadBtn.disabled = false;
        setStatus("Error: " + error.message);
      }
    });
  </script>
</body>
  </html>
