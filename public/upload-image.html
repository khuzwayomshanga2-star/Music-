<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Submission - Image Upload</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f9fafb;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }
    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }
    .success { background-color: #dcfce7; color: #166534; }
    .error { background-color: #fee2e2; color: #991b1b; }
    .info { background-color: #e0f2fe; color: #075985; }
    #preview {
      max-width: 100%;
      margin-top: 16px;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Upload Submission Image</h2>
    
    <div class="form-group">
      <label for="userId">User ID (Required)</label>
      <input type="text" id="userId" placeholder="e.g., user_12345">
    </div>

    <div class="form-group">
      <label for="submissionId">Submission ID (Optional - leave blank for new)</label>
      <input type="text" id="submissionId" placeholder="e.g., uuid-1234-5678">
    </div>

    <div class="form-group">
      <label for="imageFile">Select Cover Image</label>
      <input type="file" id="imageFile" accept="image/*">
    </div>

    <button id="uploadBtn">Upload Image</button>

    <div id="status"></div>
    <img id="preview" alt="Uploaded Image Preview">
  </div>

  <script>
    const uploadBtn = document.getElementById('uploadBtn');
    const statusDiv = document.getElementById('status');
    const previewImg = document.getElementById('preview');

    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = type;
      statusDiv.style.display = 'block';
    }

    uploadBtn.addEventListener('click', async () => {
      const userId = document.getElementById('userId').value.trim();
      const submissionId = document.getElementById('submissionId').value.trim();
      const fileInput = document.getElementById('imageFile');
      const file = fileInput.files[0];

      // Basic validation
      if (!userId) return showStatus("Please enter a User ID.", "error");
      if (!file) return showStatus("Please select an image file.", "error");

      uploadBtn.disabled = true;

      try {
        // STEP 1: Get Signature from backend
        showStatus("Step 1/3: Getting authorization signature...", "info");
        
        let signatureUrl = `/api/upload-music-image?userId=${encodeURIComponent(userId)}`;
        if (submissionId) {
          signatureUrl += `&submissionId=${encodeURIComponent(submissionId)}`;
        }

        const sigResponse = await fetch(signatureUrl);
        const sigData = await sigResponse.json();

        if (!sigResponse.ok) {
          throw new Error(sigData.error || "Failed to get signature");
        }

        // STEP 2: Upload directly to Cloudinary
        showStatus("Step 2/3: Uploading image directly to Cloudinary...", "info");
        
        const formData = new FormData();
        formData.append("file", file);
        formData.append("api_key", sigData.apiKey);
        formData.append("timestamp", sigData.timestamp);
        formData.append("signature", sigData.signature);
        formData.append("folder", sigData.folder);
        formData.append("public_id", sigData.publicId);

        // Send to Cloudinary 'image/upload' endpoint
        const cloudinaryResponse = await fetch(
          `https://api.cloudinary.com/v1_1/${sigData.cloudName}/image/upload`,
          { method: "POST", body: formData }
        );
        const cloudinaryData = await cloudinaryResponse.json();

        if (!cloudinaryResponse.ok) {
          throw new Error(cloudinaryData.error?.message || "Failed to upload to Cloudinary");
        }

        // STEP 3: Save URLs to Supabase via backend
        showStatus("Step 3/3: Saving details to database...", "info");
        
        const saveResponse = await fetch('/api/save-music-url', {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: userId,
            submissionId: sigData.submissionId, // Use the ID returned from step 1
            image_url: cloudinaryData.secure_url,
            image_public_id: sigData.publicId,
            // Passing a placeholder so your backend validation doesn't fail
            music_url: "pending_audio_upload" 
          })
        });

        const saveData = await saveResponse.json();

        if (!saveResponse.ok) {
          throw new Error(saveData.error || "Failed to save to database");
        }

        // Success state
        showStatus(`Success! Saved under Submission ID: ${sigData.submissionId}`, "success");
        
        // Show the image preview
        previewImg.src = cloudinaryData.secure_url;
        previewImg.style.display = 'block';

        // Update the input field with the new ID so the user can easily upload the audio next
        document.getElementById('submissionId').value = sigData.submissionId;

      } catch (error) {
        console.error(error);
        showStatus(`Error: ${error.message}`, "error");
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
