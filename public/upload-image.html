<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Music Image</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4">
  <div class="max-w-xl mx-auto mt-10 bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
    <h1 class="text-2xl font-bold mb-2">Upload Music Image</h1>
    <p class="text-slate-400 mb-6">This page loads the selected submission and lets you upload or update its image.</p><div class="mb-4 p-4 rounded-xl bg-slate-800/60 border border-slate-700">
  <div class="text-sm text-slate-400">Session status</div>
  <div id="sessionStatus" class="font-semibold mt-1">Loading session...</div>
  <div id="userInfo" class="text-sm text-slate-300 mt-2"></div>
</div>

<div class="mb-4 p-4 rounded-xl bg-slate-800/60 border border-slate-700">
  <div class="text-sm text-slate-400">Selected submission</div>
  <div id="selectedInfo" class="font-semibold mt-1">None selected</div>
  <div id="selectedExtra" class="text-sm text-slate-300 mt-2 whitespace-pre-line"></div>
</div>

<label class="block text-sm font-semibold mb-2">Submission ID</label>
<input id="submissionId" type="text" class="w-full mb-4 rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 outline-none" placeholder="Submission ID" />

<label class="block text-sm font-semibold mb-2">Title</label>
<input id="title" type="text" class="w-full mb-4 rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 outline-none" placeholder="Song title" />

<label class="block text-sm font-semibold mb-2">Music URL</label>
<input id="musicUrl" type="text" class="w-full mb-4 rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 outline-none" placeholder="Cloudinary music URL" />

<label class="block text-sm font-semibold mb-2">Select Image</label>
<input id="imageFile" type="file" accept="image/*" class="w-full mb-4 rounded-xl bg-slate-800 border border-slate-700 px-4 py-3" />

<button id="uploadBtn" class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 transition px-4 py-3 font-bold">
  Upload Image
</button>

<div id="status" class="mt-4 hidden rounded-xl px-4 py-3 text-sm"></div>

<img id="preview" class="hidden mt-4 rounded-xl border border-slate-700 max-w-full" alt="Uploaded preview" />

  </div>  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://vixrjkcyrlbwxgegihcm.supabase.co",
      "sb_publishable_k4gygyuumSWF1k50bYxzlA_ns1iY3lQ"
    );

    const sessionStatus = document.getElementById("sessionStatus");
    const userInfo = document.getElementById("userInfo");
    const statusBox = document.getElementById("status");
    const preview = document.getElementById("preview");
    const uploadBtn = document.getElementById("uploadBtn");
    const submissionIdInput = document.getElementById("submissionId");
    const titleInput = document.getElementById("title");
    const musicUrlInput = document.getElementById("musicUrl");
    const selectedInfo = document.getElementById("selectedInfo");
    const selectedExtra = document.getElementById("selectedExtra");

    function showStatus(message, type = "info") {
      statusBox.className =
        "mt-4 rounded-xl px-4 py-3 text-sm " +
        (type === "success"
          ? "bg-green-500/15 text-green-300 border border-green-700"
          : type === "error"
          ? "bg-red-500/15 text-red-300 border border-red-700"
          : "bg-blue-500/15 text-blue-300 border border-blue-700");
      statusBox.textContent = message;
      statusBox.classList.remove("hidden");
    }

    function getSubmissionIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("submissionId") || "";
    }

    async function refreshSession() {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;

      const currentUser = data.session?.user || null;

      if (currentUser) {
        sessionStatus.textContent = "Logged in";
        userInfo.textContent = `User ID: ${currentUser.id} | Email: ${currentUser.email || "N/A"}`;
        return currentUser;
      } else {
        sessionStatus.textContent = "Not logged in";
        userInfo.textContent = "Please sign in first.";
        return null;
      }
    }

    async function loadSelectedSubmission() {
      const submissionId = getSubmissionIdFromUrl();
      if (!submissionId) {
        selectedInfo.textContent = "No submission selected";
        selectedExtra.textContent = "Go back and tap one of your pending submissions.";
        return;
      }

      submissionIdInput.value = submissionId;
      selectedInfo.textContent = "Loading selected submission...";
      selectedExtra.textContent = "";

      const { data, error } = await supabase.rpc("get_my_music_submission", {
        submission_id: submissionId
      });

      if (error) {
        console.error(error);
        showStatus(error.message || "Failed to load submission", "error");
        selectedInfo.textContent = "Could not load submission";
        return;
      }

      const item = Array.isArray(data) ? data[0] : data;

      if (!item) {
        selectedInfo.textContent = "Submission not found";
        selectedExtra.textContent = "This row may not belong to you, or it may not exist.";
        return;
      }

      selectedInfo.textContent = item.title || "Untitled";
      selectedExtra.textContent =
        `ID: ${item.id}\n` +
        `Acceptance: ${item.acceptance}\n` +
        `Comment: ${item.comment || "No comment yet"}\n` +
        `Created: ${item.created_at ? new Date(item.created_at).toLocaleString() : "Unknown"}`;

      titleInput.value = item.title || "";
      musicUrlInput.value = item.music_url || "";

      if (item.image_url) {
        preview.src = item.image_url;
        preview.classList.remove("hidden");
      }
    }

    uploadBtn.addEventListener("click", async () => {
      try {
        const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
        if (sessionError) throw sessionError;

        const user = sessionData.session?.user;
        if (!user) {
          showStatus("You must be logged in first.", "error");
          return;
        }

        const file = document.getElementById("imageFile").files[0];
        const submissionId = submissionIdInput.value.trim();

        if (!submissionId) {
          showStatus("Missing submission ID.", "error");
          return;
        }

        if (!file) {
          showStatus("Please choose an image file.", "error");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);
        formData.append("userId", user.id);
        formData.append("submissionId", submissionId);
        formData.append("title", titleInput.value.trim());
        formData.append("musicUrl", musicUrlInput.value.trim());

        showStatus("Uploading image...", "info");
        uploadBtn.disabled = true;

        const response = await fetch("/api/upload-music-image", {
          method: "POST",
          body: formData
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.error || data.message || "Upload failed");
        }

        showStatus(
          `Uploaded successfully. Row ID: ${data.id}\nImage URL: ${data.image_url}`,
          "success"
        );

        preview.src = data.image_url;
        preview.classList.remove("hidden");
      } catch (error) {
        console.error(error);
        showStatus(error.message || "Something went wrong.", "error");
      } finally {
        uploadBtn.disabled = false;
      }
    });

    const user = await refreshSession();
    if (user) {
      await loadSelectedSubmission();
    }

    supabase.auth.onAuthStateChange(async () => {
      const u = await refreshSession();
      if (u) {
        await loadSelectedSubmission();
      }
    });
  </script></body>
  </html>
