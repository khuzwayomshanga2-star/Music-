<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Auth & Profile Manager</title>
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Welcome</h1>
      <p class="text-sm text-slate-500 mt-1" id="status-message">Checking authentication status...</p>
    </div>

    <!-- UI State 1: Logged Out View -->
    <div id="logged-out-view" class="hidden">
      <button onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 text-slate-700 font-semibold py-3 px-4 rounded-xl hover:bg-slate-50 transition cursor-pointer shadow-xs">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.61c-.3 1.56-1.17 2.87-2.48 3.75v3.12h3.99c2.34-2.15 3.62-5.32 3.62-9.72Z"/>
          <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.99-3.12c-1.12.75-2.55 1.19-3.94 1.19-3.03 0-5.6-2.05-6.52-4.82H1.42v3.2C3.4 21.84 7.45 24 12 24Z"/>
          <path fill="#FBBC05" d="M5.48 14.34A7.17 7.17 0 0 1 5.06 12c0-.81.14-1.6.42-2.34V6.46H1.42A11.96 11.96 0 0 0 0 12c0 2.05.52 4 1.42 5.74l4.06-3.4Z"/>
          <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.45 0 3.4 2.16 1.42 5.34l4.06 3.4c.92-2.77 3.49-4.82 6.52-4.82Z"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <!-- UI State 2: Logged In View -->
    <div id="logged-in-view" class="hidden space-y-4">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Email</label>
        <input type="text" id="user-email" disabled class="w-full bg-slate-100 border border-slate-200 text-slate-500 py-2.5 px-3 rounded-lg text-sm cursor-not-allowed">
      </div>

      <div>
        <label for="full-name" class="block text-xs font-semibold uppercase tracking-wider text-slate-700 mb-1">Full Name</label>
        <input type="text" id="full-name" placeholder="John Doe" class="w-full bg-white border border-slate-200 text-slate-800 py-2.5 px-3 rounded-lg text-sm focus:outline-hidden focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
      </div>

      <button onclick="updateProfile()" id="update-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition cursor-pointer">
        Save Profile Changes
      </button>

      <div class="pt-2 border-t border-slate-100 text-center">
        <button onclick="signOut()" class="text-xs text-rose-500 hover:underline font-medium cursor-pointer">
          Sign Out
        </button>
      </div>
    </div>
  </div>

  <script>
    // Initialize Supabase Client with your explicit credentials
    const SUPABASE_URL = "https://vixrjkcyrlbwxgegihcm.supabase.co";
    const SUPABASE_ANON_KEY = "Sb_publishable_k4gygyuumSWF1k50bYxzlA_ns1iY3lQ";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    // Listen for auth adjustments (login, logout, token refreshes)
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        currentUser = session.user;
        document.getElementById('status-message').innerText = "Logged in successfully";
        document.getElementById('user-email').value = currentUser.email;
        
        // Show profile panel, hide sign-in panel
        document.getElementById('logged-out-view').classList.add('hidden');
        document.getElementById('logged-in-view').classList.remove('hidden');
        
        // Fetch existing full name data from database
        await loadProfileData(currentUser.id);
      } else {
        currentUser = null;
        document.getElementById('status-message').innerText = "Please sign in to manage your profile.";
        document.getElementById('logged-in-view').classList.add('hidden');
        document.getElementById('logged-out-view').classList.remove('hidden');
      }
    });

    // 1. Google OAuth Authentication Action
    async function signInWithGoogle() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          // Redirects the user straight back to this exact page after logging in
          redirectTo: window.location.href 
        }
      });
      if (error) alert("OAuth Initialization Error: " + error.message);
    }

    // 2. Load Existing Data from Public Profiles Table
    async function loadProfileData(userId) {
      const { data, error } = await supabase
        .from('profiles')
        .select('full_name')
        .eq('id', userId)
        .single();

      if (error && error.code !== 'PGRST116') { // PGRST116 simply means no row found yet
        console.error("Error reading profile:", error.message);
      } else if (data) {
        document.getElementById('full-name').value = data.full_name || '';
      }
    }

    // 3. Insert or Update Profile Row
    async function updateProfile() {
      if (!currentUser) return;
      
      const updateBtn = document.getElementById('update-btn');
      const fullNameValue = document.getElementById('full-name').value;
      
      updateBtn.innerText = "Saving...";
      updateBtn.disabled = true;

      // 'upsert' automatically updates if a matching primary key (id) exists, or inserts if new
      const { error } = await supabase
        .from('profiles')
        .upsert({
          id: currentUser.id,
          full_name: fullNameValue,
          updated_at: new Date().toISOString()
        });

      updateBtn.disabled = false;
      updateBtn.innerText = "Save Profile Changes";

      if (error) {
        alert("Failed to update database: " + error.message);
      } else {
        alert("Profile updated successfully!");
      }
    }

    // 4. Log Out Action
    async function signOut() {
      const { error } = await supabase.auth.signOut();
      if (error) alert("Logout Error: " + error.message);
    }
  </script>
</body>
</html>
